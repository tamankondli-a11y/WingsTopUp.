<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Hub</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
}

header{
    background:#6a11cb;
    color:white;
    padding:20px;
}

h1{
    margin:0;
}

.container{
    padding:30px;
}

.card{
    background:white;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    max-width:350px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
    background:#6a11cb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2575fc;
}

footer{
    background:#222;
    color:white;
    padding:10px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>🎁 Gift Hub</h1>
<p>Find Amazing Gifts Here</p>
</header>

<div class="container">

<div class="card">
<h2>🎮 Gaming Gifts</h2>
<p>Top-up, gaming accessories and more.</p>
<button>Explore</button>
</div>

<div class="card">
<h2>🎧 Premium Gifts</h2>
<p>Special gifts for your loved ones.</p>
<button>Explore</button>
</div>

<div class="card">
<h2>🔥 Special Offers</h2>
<p>Get exciting deals and rewards.</p>
<button>Explore</button>
</div>

</div>

<footer>
<p>© 2026 Gift Hub | All Rights Reserved</p>
</footer>

</body>
</html>
